name: nightly

on:
  push:
    branches: [main]

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-linux-x64:
    name: build (linux x64)
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Install Rust coverage tools
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked

      - name: Allow ptrace for Frida
        run: sudo sysctl -w kernel.yama.ptrace_scope=0

      - run: npm ci

      - name: Smoke (patch, build, unit, integration)
        run: npm run smoke

      - name: Coverage (llvm-cov, 90% line gate)
        run: npm run coverage

      - name: Pack release archive
        run: npm run pack:release

      - uses: actions/upload-artifact@v4
        with:
          name: guardian-linux-x64
          path: dist/guardian-*-linux-x86_64.tar.gz
          if-no-files-found: error

  build-mac-x64:
    name: build (mac x64)
    if: false
    runs-on: [self-hosted, sparse-dynamics, macOS, X64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare environment
        run: |
          set -euo pipefail
          echo "$HOME/.nvm/versions/node/v24.15.0/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - run: npm ci

      - name: Smoke (patch, build, unit, integration)
        run: npm run smoke

      - name: Coverage (llvm-cov, 90% line gate)
        run: npm run coverage

      - name: Pack release archive
        run: npm run pack:release

      - uses: actions/upload-artifact@v4
        with:
          name: guardian-mac-x64
          path: dist/guardian-*-mac-x86_64.tar.gz
          if-no-files-found: error

  build-win-x64:
    name: build (win x64)
    if: false
    runs-on: [self-hosted, sparse-dynamics, Windows, X64]
    timeout-minutes: 30
    defaults:
      run:
        shell: powershell -executionpolicy bypass -command "$ErrorActionPreference='Stop'; . '{0}'"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare environment
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "C:\Strawberry\perl\bin" >> $env:GITHUB_PATH
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
          echo "C:\Program Files\nodejs" >> $env:GITHUB_PATH

      - run: npm ci

      - name: Smoke (patch, build, unit, integration)
        run: npm run smoke

      - name: Coverage (llvm-cov, 90% line gate)
        run: npm run coverage

      - name: Pack release archive
        run: npm run pack:release

      - uses: actions/upload-artifact@v4
        with:
          name: guardian-windows-x64
          path: dist/guardian-*-win-x86_64.zip
          if-no-files-found: error

  build-linux-aarch64:
    name: build (linux aarch64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Allow ptrace for Frida
        run: sudo sysctl -w kernel.yama.ptrace_scope=0

      - run: npm ci

      - name: Smoke (patch, build, unit, integration)
        run: npm run smoke

      - name: Pack release archive
        run: npm run pack:release

      - uses: actions/upload-artifact@v4
        with:
          name: guardian-linux-aarch64
          path: dist/guardian-*-linux-aarch64.tar.gz
          if-no-files-found: error

  build-mac-aarch64:
    name: build (mac aarch64)
    runs-on: [self-hosted, sparse-dynamics, macOS, ARM64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare environment
        run: |
          set -euo pipefail
          echo "$HOME/.nvm/versions/node/v24.15.0/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - run: npm ci

      - name: Smoke (patch, build, unit, integration)
        run: npm run smoke

      - name: Pack release archive
        run: npm run pack:release

      - uses: actions/upload-artifact@v4
        with:
          name: guardian-mac-aarch64
          path: dist/guardian-*-mac-aarch64.tar.gz
          if-no-files-found: error

  release:
    name: release
    needs: [build-linux-aarch64, build-mac-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Reset nightly tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          while read -r release_id; do
            gh api -X DELETE "repos/${repo}/releases/${release_id}" || true
          done < <(gh api "repos/${repo}/releases" --paginate \
            --jq '.[] | select(.tag_name == "nightly") | .id')
          gh api -X DELETE "repos/${repo}/git/refs/tags/nightly" 2>/dev/null || true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: nightly
          target_commitish: ${{ github.sha }}
          prerelease: true
          body: |
            Rolling pre-release build from [`main`](https://github.com/${{ github.repository }}/tree/main) @ [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).
          files: release/*
