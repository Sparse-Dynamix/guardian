bind = "127.0.0.1"
# port = 8080   # optional; omit for auto free port in [port_min, port_max]
# trypanophobe_filter = "http://127.0.0.1:3000/pass"
# trypanophobe_swap = true   # requires trypanophobe_filter; swap harness content with TPF response
# filter — JS expression (sa_family, addr, port, host); omit for denylist mode (hook all TCP except ignored_ports)
# filter = "host && /\.example\\.com$/.test(host)"
ignored_ports = [
    21, 22, 23, 25, 53, 853, 5353, 110, 143, 465, 587, 993, 995,
    3306, 5432, 6379, 27017, 3389, 389, 636, 5060,
]
ca_dir = "~/.guardian"

filter_timeout_secs = 10
block_message = "Blocked by Guardian: content failed safety check"

port_min = 1024
port_max = 65535
proxy_ready_timeout_secs = 5
process_poll_interval_ms = 50

ca_bundle_name = "guardian-ca-bundle.pem"
java_truststore_name = "guardian-java-truststore.p12"
java_truststore_password = "guardian"
deno_tls_ca_store = "system,mozilla"
node_options_append = "--use-openssl-ca"
