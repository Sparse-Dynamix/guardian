# Platform-neutral smoke scenarios. Runners map these to OS-specific curl/shell wrappers.

[[case]]
name = "direct_https"
command = "direct"
silent = false
expect_exit = 0
expect_jsonl_type = "http"
expect_stdout_nonempty = true

[[case]]
name = "child_spawn"
command = "child"
silent = false
expect_exit = 0
expect_jsonl_type = "http"
expect_stdout_nonempty = true

[[case]]
name = "silent"
command = "direct"
silent = true
expect_exit = 0
expect_jsonl_type = ""
expect_stdout_nonempty = true
